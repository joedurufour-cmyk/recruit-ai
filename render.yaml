services:
  - type: web
    name: recruit-ai-api
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: KIMI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: API_SECRET
        sync: false  # Set manually in Render dashboard
      - key: KIMI_MODEL
        value: "kimi-latest"
