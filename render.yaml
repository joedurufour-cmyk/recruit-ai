services:
  - type: web
    name: recruit-ai-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: KIMI_API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: KIMI_MODEL
        value: "kimi-latest"
