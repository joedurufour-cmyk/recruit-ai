services:
  - type: web
    name: recruit-ai-api
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: KIMI_API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: KIMI_MODEL
        value: "kimi-latest"
